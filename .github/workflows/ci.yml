name: CI

on:
  push:
    branches: [main, develop, feat/**]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  validate:
    name: Validate and security gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Validate
        run: pnpm validate:ci

  lint-and-build:
    name: Build (TypeScript)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build all packages
        run: pnpm build

      - name: Check bundle budgets
        run: pnpm check:bundle-budgets

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: lint-and-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: queueplatform
          POSTGRES_PASSWORD: queueplatform
          POSTGRES_DB: queueplatform_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://queueplatform:queueplatform@localhost:5432/queueplatform_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key-32-chars-min!!
      JWT_REFRESH_SECRET: ci-test-refresh-secret-key-32ch!
      JWT_IMPERSONATION_TTL: '900'
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      CENTRIFUGO_API_URL: http://localhost:8000/api
      CENTRIFUGO_API_KEY: ci-key
      CENTRIFUGO_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate:deploy

      - name: Run unit tests
        run: pnpm test

  test-rls-policy:
    name: Test RLS policy isolation
    runs-on: ubuntu-latest
    needs: test-api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: queueplatform
          POSTGRES_PASSWORD: queueplatform
          POSTGRES_DB: queueplatform_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://queueplatform:queueplatform@localhost:5432/queueplatform_test
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate:deploy

      - name: Configure RLS app database role
        run: APP_DATABASE_PASSWORD=ci-qms-app-pass pnpm --filter @queueplatform/database setup:app-db-user

      - name: Run tenant isolation integration spec
        run: |
          export INTEGRATION_DATABASE_URL="postgresql://qms_app:ci-qms-app-pass@localhost:5432/queueplatform_test"
          pnpm --filter @queueplatform/api test -- src/prisma/tenant-isolation.spec.ts

  test-e2e-health:
    name: E2E API health smoke
    runs-on: ubuntu-latest
    needs: test-api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: queueplatform
          POSTGRES_PASSWORD: queueplatform
          POSTGRES_DB: queueplatform_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://queueplatform:queueplatform@localhost:5432/queueplatform_test
      APP_DATABASE_URL: postgresql://queueplatform:queueplatform@localhost:5432/queueplatform_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key-32-chars-min!!
      JWT_REFRESH_SECRET: ci-test-refresh-secret-key-32ch!
      JWT_IMPERSONATION_TTL: '900'
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      TWILIO_AUTH_TOKEN: twilio_test_token
      ENCRYPTION_KEY: ci-encryption-key-value
      APP_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      CENTRIFUGO_API_URL: http://localhost:8000/api
      CENTRIFUGO_API_KEY: ci-key
      CENTRIFUGO_SECRET: ci-secret
      CENTRIFUGO_WEBHOOK_SECRET: ci-webhook-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate:deploy

      - name: Build API
        run: pnpm --filter @queueplatform/api build

      - name: Install Playwright browser
        run: pnpm --filter @queueplatform/e2e exec playwright install --with-deps chromium

      - name: Run e2e health spec
        run: |
          pnpm --filter @queueplatform/api start &
          for i in {1..45}; do
            if curl -fsS "http://localhost:4000/api/v1/health" >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://localhost:4000/api/v1/health" >/dev/null
          pnpm --filter @queueplatform/e2e test -- tests/api-health.spec.ts tests/api-contract.spec.ts

  test-e2e-admin:
    name: E2E admin smoke
    runs-on: ubuntu-latest
    needs: test-api
    env:
      APP_URL: http://localhost:3002
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin app
        run: pnpm --filter @queueplatform/shared build && pnpm --filter @queueplatform/frontend-core build && pnpm --filter @queueplatform/admin build

      - name: Install Playwright browser
        run: pnpm --filter @queueplatform/e2e exec playwright install --with-deps chromium

      - name: Run e2e admin specs
        run: |
          PORT=3002 pnpm --filter @queueplatform/admin start &
          for i in {1..45}; do
            if curl -fsS "http://localhost:3002/login" >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://localhost:3002/login" >/dev/null
          pnpm --filter @queueplatform/e2e test -- tests/admin-auth.spec.ts tests/admin-dashboard.spec.ts

  test-e2e-realtime:
    name: E2E tenant auth + realtime smoke
    runs-on: ubuntu-latest
    needs: test-api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: queueplatform
          POSTGRES_PASSWORD: queueplatform
          POSTGRES_DB: queueplatform_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://queueplatform:queueplatform@localhost:5432/queueplatform_test
      APP_DATABASE_URL: postgresql://queueplatform:queueplatform@localhost:5432/queueplatform_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key-32-chars-min!!
      JWT_REFRESH_SECRET: ci-test-refresh-secret-key-32ch!
      JWT_IMPERSONATION_TTL: '900'
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      TWILIO_AUTH_TOKEN: twilio_test_token
      ENCRYPTION_KEY: ci-encryption-key-value
      APP_URL: http://localhost:3001
      API_URL: http://localhost:4000
      API_BASE: http://localhost:4000/api/v1
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_CENTRIFUGO_WS_URL: ws://localhost:8000/connection/websocket
      CENTRIFUGO_API_URL: http://localhost:8000/api
      CENTRIFUGO_API_KEY: ci-key
      CENTRIFUGO_SECRET: ci-secret
      CENTRIFUGO_WEBHOOK_SECRET: ci-webhook-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate:deploy

      - name: Build API and web
        run: pnpm --filter @queueplatform/shared build && pnpm --filter @queueplatform/frontend-core build && pnpm --filter @queueplatform/database build && pnpm --filter @queueplatform/api build && pnpm --filter @queueplatform/web build

      - name: Install Playwright browser
        run: pnpm --filter @queueplatform/e2e exec playwright install --with-deps chromium

      - name: Run e2e tenant + realtime specs
        run: |
          bash scripts/start-centrifugo-ci.sh
          pnpm --filter @queueplatform/api start &
          PORT=3001 pnpm --filter @queueplatform/web start &
          for i in {1..45}; do
            if curl -fsS "http://localhost:4000/api/v1/health" >/dev/null && curl -fsS "http://localhost:3001/login" >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://localhost:4000/api/v1/health" >/dev/null
          curl -fsS "http://localhost:3001/login" >/dev/null
          curl -fsS "http://localhost:8000/health" >/dev/null
          pnpm --filter @queueplatform/e2e test -- tests/tenant-auth.spec.ts tests/realtime-display.spec.ts
          docker rm -f qp-centrifugo-ci >/dev/null 2>&1 || true

  test-notifications-smoke:
    name: Notifications smoke
    runs-on: ubuntu-latest
    needs: test-api
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      TWILIO_AUTH_TOKEN: twilio_test_token
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run notifications tests
        run: pnpm --filter @queueplatform/notifications test

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: railway/docker/api.Dockerfile
          push: false
          tags: queueplatform/api:${{ github.sha }}
# ─────────────────────────────────────────────────────────────────────────────
# Companion workflows are intentionally disabled (renamed *.disabled) because
# they fail without repository secrets. Enable by removing the `.disabled`
# suffix once the listed secrets exist in repo/org settings:
#
#   load-nightly.yml.disabled
#     Requires: LOAD_TEST_BASE_URL, LOAD_TEST_ORG_ID, LOAD_TEST_BRANCH_ID,
#               LOAD_TEST_QUEUE_ID, LOAD_TEST_SERVICE_ID
#     The job self-fails fast if any are missing (see the guard step).
#
#   docker-{api,web,admin}-ghcr.yml.disabled
#     Requires: GHCR push auth (GITHUB_TOKEN with packages:write, or a PAT) and
#               the repo's GHCR package visibility configured.
#
# Until enabled, the active `docker` job above still verifies the API image
# builds on `main` (push: false), so image build regressions are caught here.
# ─────────────────────────────────────────────────────────────────────────────
